# jumpins.com nginx fixes — give to hosting admin
# Fixes: double redirect chain, HSTS, security headers, version disclosure

# 1. Single-hop 301: send all www + HTTP variants straight to https://jumpins.com
#    (currently http://www.jumpins.com takes 2 hops and leaks link equity)
server {
    listen 80;
    listen 443 ssl;
    server_name www.jumpins.com;
    # ssl_certificate / ssl_certificate_key: reuse existing cert covering www
    return 301 https://jumpins.com$request_uri;
}

server {
    listen 80;
    server_name jumpins.com;
    return 301 https://jumpins.com$request_uri;
}

